<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fennekin Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="img">
            <img src="./fennekin sprite.png" alt="fennekin sprite">
        </div>
        <div class="top">
            <h1>Fennekin</h1>
            <div class="type"><p>Fire</p></div>
        </div>
        <div class="bottom">
            <h3>Height: 4</h3>
            <h3>Weight: 94</h3>
            <h3>Abilities: Blaze , Magician</h3>
            <h3>Base Experience: 61</h3>
        </div>  
    </div>
</body>
</html>
